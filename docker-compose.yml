services:
  fast-app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://192.168.1.2:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-glm-5:cloud}
      - RESUME_API_KEY=${RESUME_API_KEY}
      - RESUME_ENDPOINT=${RESUME_ENDPOINT:-http://reactive-resume:3000}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./profile.json:/app/profile.json:ro
      - ./base-resume.json:/app/base-resume.json:ro
      - ./base-cover-letter.json:/app/base-cover-letter.json:ro
      - ./output:/app/output
      - fast-app-state:/root/.fast-app
    restart: unless-stopped

volumes:
  fast-app-state: