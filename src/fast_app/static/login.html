<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast App - Login</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="stylesheet" href="/static/app.css?v=1">
    <link rel="stylesheet" href="/static/login.css?v=1">
    <script src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
    <script src="/static/app-base.js"></script>
    <script src="/static/navbar.js"></script>
</head>
<body class="login-page">
    <div class="login-card" x-data="authForm()">
        <div id="navbar-container"></div>

        <h1>🚀 Fast App</h1>
        <p class="subtitle" x-text="mode === 'login' ? 'Log in to your account' : 'Create a new account'"></p>

        <div x-show="error" x-transition class="error-message" x-text="error"></div>

        <form @submit.prevent="mode === 'login' ? submitLogin() : submitRegister()">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" x-model="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" x-model="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group" x-show="mode === 'register'" x-transition>
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" x-model="confirm_password" placeholder="Confirm your password">
            </div>

            <button type="submit" class="btn-primary" :disabled="loading">
                <span x-show="!loading" x-text="mode === 'login' ? 'Log In' : 'Create Account'"></span>
                <span x-show="loading">Please wait...</span>
            </button>
        </form>

        <div class="toggle-mode">
            <span x-text="mode === 'login' ? \"Don't have an account?\" : 'Already have an account?'"></span>
            <a @click="toggleMode()" x-text="mode === 'login' ? 'Create one' : 'Log in'"></a>
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
