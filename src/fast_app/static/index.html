<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast App - Resume Generator</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="stylesheet" href="/static/app.css?v=1">
    <link rel="stylesheet" href="/static/login.css?v=1">
    <script src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
    <script src="/static/app-base.js"></script>
    <script src="/static/navbar.js"></script>
</head>
<body>
    <div class="container" x-data>
        <!-- Navbar -->
        <nav class="navbar" x-show="true">
            <div class="navbar-brand">
                <a href="/" class="navbar-logo">🚀 Fast App</a>
            </div>
            <div class="navbar-links">
                <a href="/" class="navbar-link">Generator</a>
                <a href="/profile" class="navbar-link">Profile</a>
                <a href="/knowledge" class="navbar-link">Knowledge</a>
                <a href="/search" class="navbar-link">Search</a>
                <a href="/chat" class="navbar-link">Chat</a>
            </div>
            <div class="navbar-auth" x-show="$store.auth.authEnabled">
                <template x-if="$store.auth.isLoggedIn">
                    <div class="navbar-user">
                        <span class="navbar-email" x-text="$store.auth.user?.email || ''"></span>
                        <button class="btn-navbar-logout" @click="$store.auth.logout()">Logout</button>
                    </div>
                </template>
                <template x-if="!$store.auth.isLoggedIn">
                    <a href="/login" class="navbar-link">Login</a>
                </template>
            </div>
        </nav>

        <!-- Header -->
        <header>
            <h1>🚀 Fast App</h1>
            <p class="subtitle">Generate tailored resumes from job postings</p>
        </header>

        <!-- Job Submission Form -->
        <div id="submission-form">
            <div class="form-group">
                <label for="job-url">Job URL <span class="optional-label">(optional if pasting description)</span></label>
                <input type="url" id="job-url" placeholder="https://example.com/job/123">
            </div>

            <div class="or-divider">— or paste the description —</div>

            <div class="form-group">
                <label for="job-description">Job Description <span class="optional-label">(optional if using URL)</span></label>
                <textarea id="job-description" placeholder="Paste the full job description here..." rows="8"></textarea>
            </div>

            <div id="flags">
                <label>
                    <input type="checkbox" id="force">
                    <span>Force regeneration (ignore cache)</span>
                </label>
                <label>
                    <input type="checkbox" id="debug">
                    <span>Debug mode (verbose output)</span>
                </label>
                <label>
                    <input type="checkbox" id="overwrite">
                    <span>Overwrite existing resume</span>
                </label>
                <label>
                    <input type="checkbox" id="skip-questions">
                    <span>Skip questions (use cached or empty)</span>
                </label>
                <label>
                    <input type="checkbox" id="skip-cover">
                    <span>Skip cover letter</span>
                </label>
            </div>

            <div class="buttons">
                <button id="submit-btn" class="btn-primary" type="button" disabled>Generate Resume</button>
            </div>
        </div>

        <!-- Progress Area (hidden initially) -->
        <div id="progress-area" hidden>
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress-fill" style="width: 0%"></div>
                </div>
                <div id="status-text" class="status">Initializing...</div>
            </div>

            <div id="log-output" class="logs">
                <!-- Logs will be streamed here -->
            </div>

            <div class="buttons">
                <button id="cancel-btn" class="btn-danger">Cancel</button>
            </div>
        </div>

        <!-- Question Modal (hidden initially) -->
        <div id="question-modal" class="modal" hidden>
            <div class="modal-content">
                <h3 id="question-title">Question <span id="q-num">1</span> of <span id="q-total">3</span></h3>
                <p id="question-text" class="question-text"></p>
                <textarea id="answer-input" placeholder="Type your answer..." rows="6"></textarea>
                <div class="modal-buttons">
                    <button id="cancel-btn" class="btn-danger">Cancel</button>
                    <button id="skip-btn" class="btn-secondary">Skip</button>
                    <button id="submit-answer-btn" class="btn-primary">Submit Answer</button>
                </div>
            </div>
        </div>

        <!-- Results (hidden initially) -->
        <div id="results" hidden>
            <div class="success-box">
                <h2>✨ Complete!</h2>
                <p>Your resume and cover letter have been created.</p>
                <div class="result-links">
                    <a id="resume-link" class="btn-primary" target="_blank">📄 View Resume</a>
                    <a id="cover-letter-link" class="btn-secondary" target="_blank">✉️ View Cover Letter</a>
                </div>
                <button id="new-job-btn" class="btn-link">Generate another resume</button>
            </div>
        </div>

        <!-- Error (hidden initially) -->
        <div id="error-box" hidden>
            <div class="error-box">
                <h2>❌ Error</h2>
                <p id="error-message"></p>
                <div class="error-details">
                    <pre id="error-trace"></pre>
                </div>
                <div class="buttons">
                    <button id="cancel-btn" class="btn-danger">Cancel</button>
                    <button id="retry-btn" class="btn-primary">Retry</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
