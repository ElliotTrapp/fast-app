<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast App - Resume Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🚀 Fast App</h1>
            <p class="subtitle">Generate tailored resumes from job URLs</p>
        </header>

        <!-- Job Submission Form -->
        <div id="submission-form">
            <div class="form-group">
                <label for="job-url">Job URL</label>
                <input type="url" id="job-url" placeholder="https://example.com/job/123" required>
            </div>

            <div id="flags">
                <label>
                    <input type="checkbox" id="force">
                    <span>Force regeneration (ignore cache)</span>
                </label>
                <label>
                    <input type="checkbox" id="debug">
                    <span>Debug mode (verbose output)</span>
                </label>
                <label>
                    <input type="checkbox" id="overwrite">
                    <span>Overwrite existing resume</span>
                </label>
                <label>
                    <input type="checkbox" id="skip-questions">
                    <span>Skip questions (use cached or empty)</span>
                </label>
                <label>
                    <input type="checkbox" id="skip-cover">
                    <span>Skip cover letter</span>
                </label>
            </div>

            <div class="buttons">
                <button id="submit-btn" class="btn-primary">Generate Resume</button>
                <button id="stop-btn" class="btn-danger" hidden>Stop</button>
            </div>
        </div>

        <!-- Progress Area (hidden initially) -->
        <div id="progress-area" hidden>
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress-fill" style="width: 0%"></div>
                </div>
                <div id="status-text" class="status">Initializing...</div>
            </div>

            <div id="log-output" class="logs">
                <!-- Logs will be streamed here -->
            </div>
        </div>

        <!-- Question Modal (hidden initially) -->
        <div id="question-modal" class="modal" hidden>
            <div class="modal-content">
                <h3 id="question-title">Question <span id="q-num">1</span> of <span id="q-total">3</span></h3>
                <p id="question-text" class="question-text"></p>
                <textarea id="answer-input" placeholder="Type your answer..." rows="6"></textarea>
                <div class="modal-buttons">
                    <button id="skip-btn" class="btn-secondary">Skip</button>
                    <button id="submit-answer-btn" class="btn-primary">Submit Answer</button>
                </div>
            </div>
        </div>

        <!-- Results (hidden initially) -->
        <div id="results" hidden>
            <div class="success-box">
                <h2>✨ Complete!</h2>
                <p>Your resume and cover letter have been created.</p>
                <div class="result-links">
                    <a id="resume-link" class="btn-primary" target="_blank">📄 View Resume</a>
                    <a id="cover-letter-link" class="btn-secondary" target="_blank">✉️ View Cover Letter</a>
                </div>
                <button id="new-job-btn" class="btn-link">Generate another resume</button>
            </div>
        </div>

        <!-- Error (hidden initially) -->
        <div id="error-box" hidden>
            <div class="error-box">
                <h2>❌ Error</h2>
                <p id="error-message"></p>
                <div class="error-details">
                    <pre id="error-trace"></pre>
                </div>
                <button id="retry-btn" class="btn-primary">Retry</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
